<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>Konuşuyorum 🎤</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin: 30px 0;
            font-size: 3em;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid transparent;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 1.1em;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .card:active {
            transform: scale(0.95);
        }

        .card.person {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .card.category {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-color: #f5576c;
        }

        .card.word {
            background: white;
            border: 3px solid #667eea;
            color: #333;
        }

        .word-image {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            margin: 10px 0;
            border: 2px solid #667eea;
        }

        .word-text {
            font-size: 1.3em;
            font-weight: 800;
            color: #667eea;
            margin: 10px 0;
            word-break: break-word;
            line-height: 1.3;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .word-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid #667eea;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .word-card:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            padding: 16px 24px;
            font-size: 1.1em;
            font-weight: 700;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            font-family: 'Poppins', sans-serif;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .speak-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            font-family: 'Poppins', sans-serif;
            margin-top: 10px;
        }

        .speak-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .speak-btn:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 25px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 3px solid #667eea;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 2em;
            font-weight: 800;
            margin-bottom: 30px;
            color: #667eea;
        }

        .form-group {
            margin: 20px 0;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.1em;
            color: #667eea;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 3px solid #667eea;
            border-radius: 12px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245,87,108,0.1);
            transform: scale(1.01);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .color-picker {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border: 4px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .color-option.selected {
            border-color: #333;
            transform: scale(1.15);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 14px 24px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            font-family: 'Poppins', sans-serif;
        }

        .back-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-family: 'Poppins', sans-serif;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 1.3em;
            font-weight: 700;
        }

        .empty-state-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .header {
                font-size: 2em;
                margin: 20px 0;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin: 20px 0;
            }

            .word-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .btn {
                min-width: 100px;
                padding: 12px 16px;
                font-size: 1em;
            }

            .modal-content {
                padding: 25px;
                border-radius: 15px;
            }

            .modal-header {
                font-size: 1.6em;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🎤 Konuşuyorum</div>

        <!-- Person Screen -->
        <div id="personScreen" class="screen active">
            <div class="button-group">
                <button class="btn btn-success" onclick="openPersonModal()">➕ Yeni Kişi</button>
            </div>
            <div id="personGrid" class="grid"></div>
            <div id="emptyPersons" class="empty-state" style="display: none;">
                <div class="empty-state-icon">👤</div>
                <div>Henüz kişi eklenmemiş!</div>
            </div>
        </div>

        <!-- Category Screen -->
        <div id="categoryScreen" class="screen">
            <button class="back-btn" onclick="goToPerson()">⬅️ Geri</button>
            <div class="button-group">
                <button class="btn btn-success" onclick="openCategoryModal()">➕ Kategori Ekle</button>
            </div>
            <div id="categoryGrid" class="grid"></div>
            <div id="emptyCategories" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📂</div>
                <div>Henüz kategori eklenmemiş!</div>
            </div>
        </div>

        <!-- Word Screen -->
        <div id="wordScreen" class="screen">
            <button class="back-btn" onclick="goToCategory()">⬅️ Geri</button>
            <div class="button-group">
                <button class="btn btn-success" onclick="openWordModal()">➕ Kelime Ekle</button>
            </div>
            <div id="wordGrid" class="word-grid"></div>
            <div id="emptyWords" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📝</div>
                <div>Henüz kelime eklenmemiş!</div>
            </div>
        </div>
    </div>

    <!-- Person Modal -->
    <div id="personModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Yeni Kişi Ekle</div>
            <div class="form-group">
                <label>Kişi Adı:</label>
                <input type="text" id="personName" placeholder="Örn: Ahmet">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="savePerson()">✅ Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('personModal')">❌ İptal</button>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Kategori Ekle</div>
            <div class="form-group">
                <label>Kategori Adı:</label>
                <input type="text" id="categoryName" placeholder="Örn: Meyve">
            </div>
            <div class="form-group">
                <label>Renk Seç:</label>
                <div class="color-picker">
                    <div class="color-option selected" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #30cfd0 0%, #330867 100%)')"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveCategory()">✅ Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('categoryModal')">❌ İptal</button>
            </div>
        </div>
    </div>

    <!-- Word Modal -->
    <div id="wordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Kelime/Cümle Ekle</div>
            <div class="form-group">
                <label>Kelime/Cümle:</label>
                <textarea id="wordText" placeholder="Örn: Merhaba"></textarea>
            </div>
            <div class="form-group">
                <label>Fotoğraf (isteğe bağlı):</label>
                <input type="file" id="wordImage" accept="image/*">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveWord()">✅ Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('wordModal')">❌ İptal</button>
            </div>
        </div>
    </div>

    <script>
        let currentPerson = null;
        let currentCategory = null;
        let selectedColor = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';

        function init() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
            renderPersons();
        }

        function getData() {
            return JSON.parse(localStorage.getItem('konusuyorum') || '{"persons":[]}');
        }

        function saveData(data) {
            localStorage.setItem('konusuyorum', JSON.stringify(data));
        }

        function renderPersons() {
            const data = getData();
            const grid = document.getElementById('personGrid');
            const empty = document.getElementById('emptyPersons');

            grid.innerHTML = '';

            if (data.persons.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            data.persons.forEach((person, idx) => {
                const card = document.createElement('div');
                card.className = 'card person';
                card.innerHTML = `
                    <div>${person.name}</div>
                    <button class="delete-btn" onclick="deletePerson(${idx})">🗑️ Sil</button>
                `;
                card.onclick = (e) => {
                    if (e.target.className !== 'delete-btn') {
                        selectPerson(idx);
                    }
                };
                grid.appendChild(card);
            });
        }

        function selectPerson(idx) {
            currentPerson = idx;
            showScreen('categoryScreen');
            renderCategories();
        }

        function deletePerson(idx) {
            if (confirm('Bu kişiyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons.splice(idx, 1);
                saveData(data);
                renderPersons();
            }
        }

        function openPersonModal() {
            document.getElementById('personName').value = '';
            document.getElementById('personModal').classList.add('active');
            document.getElementById('personName').focus();
        }

        function savePerson() {
            const name = document.getElementById('personName').value.trim();
            if (!name) {
                alert('Lütfen kişi adı girin!');
                return;
            }

            const data = getData();
            data.persons.push({ name, categories: [] });
            saveData(data);
            closeModal('personModal');
            renderPersons();
        }

        function renderCategories() {
            const data = getData();
            const person = data.persons[currentPerson];
            const grid = document.getElementById('categoryGrid');
            const empty = document.getElementById('emptyCategories');

            grid.innerHTML = '';

            if (!person || person.categories.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            person.categories.forEach((cat, idx) => {
                const card = document.createElement('div');
                card.className = 'card category';
                card.style.background = cat.color;
                card.innerHTML = `
                    <div>${cat.name}</div>
                    <button class="delete-btn" onclick="deleteCategory(${idx})">🗑️ Sil</button>
                `;
                card.onclick = (e) => {
                    if (e.target.className !== 'delete-btn') {
                        selectCategory(idx);
                    }
                };
                grid.appendChild(card);
            });
        }

        function selectCategory(idx) {
            currentCategory = idx;
            showScreen('wordScreen');
            renderWords();
        }

        function deleteCategory(idx) {
            if (confirm('Bu kategoriyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons[currentPerson].categories.splice(idx, 1);
                saveData(data);
                renderCategories();
            }
        }

        function openCategoryModal() {
            document.getElementById('categoryName').value = '';
            selectedColor = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            document.querySelectorAll('.color-option').forEach((el, idx) => {
                el.classList.toggle('selected', idx === 0);
            });
            document.getElementById('categoryModal').classList.add('active');
            document.getElementById('categoryName').focus();
        }

        function selectColor(el, color) {
            document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedColor = color;
        }

        function saveCategory() {
            const name = document.getElementById('categoryName').value.trim();
            if (!name) {
                alert('Lütfen kategori adı girin!');
                return;
            }

            const data = getData();
            data.persons[currentPerson].categories.push({
                name,
                color: selectedColor,
                words: []
            });
            saveData(data);
            closeModal('categoryModal');
            renderCategories();
        }

        function renderWords() {
            const data = getData();
            const category = data.persons[currentPerson].categories[currentCategory];
            const grid = document.getElementById('wordGrid');
            const empty = document.getElementById('emptyWords');

            grid.innerHTML = '';

            if (!category || category.words.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            category.words.forEach((word, idx) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerHTML = `
                    <div>
                        <div class="word-text">${word.text}</div>
                        ${word.image ? `<img src="${word.image}" class="word-image">` : ''}
                    </div>
                    <div>
                        <button class="speak-btn" onclick="speakWord('${word.text.replace(/'/g, "\\'")}')">🔊 Oku</button>
                        <button class="delete-btn" onclick="deleteWord(${idx})">🗑️ Sil</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function speakWord(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function deleteWord(idx) {
            if (confirm('Bu kelimeyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons[currentPerson].categories[currentCategory].words.splice(idx, 1);
                saveData(data);
                renderWords();
            }
        }

        function openWordModal() {
            document.getElementById('wordText').value = '';
            document.getElementById('wordImage').value = '';
            document.getElementById('wordModal').classList.add('active');
            document.getElementById('wordText').focus();
        }

        function saveWord() {
            const text = document.getElementById('wordText').value.trim();
            if (!text) {
                alert('Lütfen kelime/cümle girin!');
                return;
            }

            const fileInput = document.getElementById('wordImage');
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addWordToData(text, e.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                addWordToData(text, null);
            }
        }

        function addWordToData(text, image) {
            const data = getData();
            data.persons[currentPerson].categories[currentCategory].words.push({
                text,
                image
            });
            saveData(data);
            closeModal('wordModal');
            renderWords();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goToPerson() {
            showScreen('personScreen');
            renderPersons();
        }

        function goToCategory() {
            showScreen('categoryScreen');
            renderCategories();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
