<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFB6D9">
    <meta name="description" content="Konuşuyorum - Konuşamayan çocuklar için sesli iletişim uygulaması">
    <title>Konuşuyorum 🎤</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FFF5E6 0%, #FFE6F0 50%, #E6F3FF 100%);
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: #FF69B4;
            margin: 20px 0 30px 0;
            font-size: 3em;
            text-shadow: 2px 2px 0px rgba(255, 182, 217, 0.5);
            font-weight: 700;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Person Selector Screen */
        .person-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .person-card {
            background: linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%);
            border: 0;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.3em;
            color: #6B2D5C;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.2);
            position: relative;
            overflow: hidden;
        }

        .person-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            transition: all 0.6s;
        }

        .person-card:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 105, 180, 0.35);
        }

        .person-card:active {
            transform: scale(0.95);
        }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .category-card {
            border: 0;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 100%);
            pointer-events: none;
        }

        .category-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .category-card:active {
            transform: scale(0.95);
        }

        /* Word Grid */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 18px;
            margin: 20px 0;
        }

        .word-card {
            background: white;
            border: 0;
            border-radius: 25px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FFB6D9, #B6E6FF, #B6FFD9);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        .word-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        .word-card:active {
            transform: scale(0.95);
        }

        .word-text {
            font-size: 1.4em;
            font-weight: 700;
            color: #6B2D5C;
            margin: 10px 0;
            word-break: break-word;
            line-height: 1.3;
        }

        .word-image {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 15px;
            margin: 10px 0;
            border: 3px solid #FFE6F0;
        }

        .speak-btn {
            background: linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%);
            color: #6B2D5C;
            border: 0;
            border-radius: 15px;
            padding: 12px 18px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
        }

        .speak-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.3);
        }

        .speak-btn:active {
            transform: scale(0.95);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 110px;
            padding: 16px 24px;
            font-size: 1.15em;
            font-weight: 700;
            border: 0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #98FF98 0%, #90EE90 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #FFB6B9 0%, #FFA6A6 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #FFD9B3 0%, #FFCC99 100%);
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease-in;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 30px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 25px;
            color: #FF69B4;
            text-shadow: 1px 1px 0px rgba(255, 182, 217, 0.3);
        }

        .form-group {
            margin: 20px 0;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.15em;
            color: #6B2D5C;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 3px solid #FFE6F0;
            border-radius: 15px;
            font-size: 1em;
            font-family: 'Fredoka', sans-serif;
            transition: all 0.3s;
            background: #FFF9FC;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #FFB6D9;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 182, 217, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .color-picker {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            border: 4px solid #ddd;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .color-option.selected {
            border-color: #FF69B4;
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
        }

        /* Back Button */
        .back-btn {
            background: linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%);
            color: #6B2D5C;
            border: 0;
            border-radius: 20px;
            padding: 14px 22px;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 18px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 15px rgba(255, 105, 180, 0.2);
            font-family: 'Fredoka', sans-serif;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #FF69B4;
            font-size: 1.3em;
            font-weight: 600;
        }

        .empty-state-icon {
            font-size: 5em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header {
                font-size: 2.2em;
                margin: 15px 0 20px 0;
            }

            .person-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .category-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .word-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .btn {
                min-width: 90px;
                padding: 12px 16px;
                font-size: 1em;
            }

            .modal-content {
                padding: 25px;
            }

            .modal-header {
                font-size: 1.6em;
            }
        }

        .delete-btn {
            background: linear-gradient(135deg, #FFB6B9 0%, #FFA6A6 100%);
            color: white;
            border: 0;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(255, 166, 166, 0.2);
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 166, 166, 0.3);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #FFE6F0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #FF69B4 0%, #FFB6D9 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🎤 Konuşuyorum</div>

        <!-- Person Selector Screen -->
        <div id="personScreen" class="screen active">
            <div class="button-group">
                <button class="btn btn-success" onclick="openPersonModal()">➕ Yeni Kişi Ekle</button>
            </div>
            <div id="personGrid" class="person-grid"></div>
            <div id="emptyPersons" class="empty-state" style="display: none;">
                <div class="empty-state-icon">👤</div>
                <div>Henüz kişi eklenmemiş. Yeni kişi eklemek için butona basın!</div>
            </div>
        </div>

        <!-- Category Screen -->
        <div id="categoryScreen" class="screen">
            <button class="back-btn" onclick="goToPerson()">⬅️ Geri Dön</button>
            <div class="button-group">
                <button class="btn btn-success" onclick="openCategoryModal()">➕ Kategori Ekle</button>
            </div>
            <div id="categoryGrid" class="category-grid"></div>
            <div id="emptyCategories" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📂</div>
                <div>Henüz kategori eklenmemiş. Yeni kategori eklemek için butona basın!</div>
            </div>
        </div>

        <!-- Word Screen -->
        <div id="wordScreen" class="screen">
            <button class="back-btn" onclick="goToCategory()">⬅️ Geri Dön</button>
            <div class="button-group">
                <button class="btn btn-success" onclick="openWordModal()">➕ Kelime/Cümle Ekle</button>
            </div>
            <div id="wordGrid" class="word-grid"></div>
            <div id="emptyWords" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📝</div>
                <div>Henüz kelime eklenmemiş. Yeni kelime eklemek için butona basın!</div>
            </div>
        </div>
    </div>

    <!-- Person Modal -->
    <div id="personModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Yeni Kişi Ekle</div>
            <div class="form-group">
                <label>Kişi Adı:</label>
                <input type="text" id="personName" placeholder="Örn: Ahmet">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="savePerson()">Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('personModal')">İptal</button>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Kategori Ekle</div>
            <div class="form-group">
                <label>Kategori Adı:</label>
                <input type="text" id="categoryName" placeholder="Örn: Meyve">
            </div>
            <div class="form-group">
                <label>Renk Seç:</label>
                <div class="color-picker">
                    <div class="color-option selected" style="background: linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #87CEEB 0%, #B0E0E6 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #98FF98 0%, #90EE90 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #98FF98 0%, #90EE90 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #FFD9B3 0%, #FFCC99 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #FFD9B3 0%, #FFCC99 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #FFB6B9 0%, #FFA6A6 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #FFB6B9 0%, #FFA6A6 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #E6B3FF 0%, #D9B3FF 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #E6B3FF 0%, #D9B3FF 100%)')"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveCategory()">Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('categoryModal')">İptal</button>
            </div>
        </div>
    </div>

    <!-- Word Modal -->
    <div id="wordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Kelime/Cümle Ekle</div>
            <div class="form-group">
                <label>Kelime/Cümle:</label>
                <textarea id="wordText" placeholder="Örn: Merhaba"></textarea>
            </div>
            <div class="form-group">
                <label>Fotoğraf (isteğe bağlı):</label>
                <input type="file" id="wordImage" accept="image/*">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveWord()">Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('wordModal')">İptal</button>
            </div>
        </div>
    </div>

    <script>
        let currentPerson = null;
        let currentCategory = null;
        let selectedColor = 'linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%)';

        // Initialize
        function init() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
            renderPersons();
        }

        // Data Management
        function getData() {
            return JSON.parse(localStorage.getItem('konusuyorum') || '{"persons":[]}');
        }

        function saveData(data) {
            localStorage.setItem('konusuyorum', JSON.stringify(data));
        }

        // Person Functions
        function renderPersons() {
            const data = getData();
            const grid = document.getElementById('personGrid');
            const empty = document.getElementById('emptyPersons');

            grid.innerHTML = '';

            if (data.persons.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            data.persons.forEach((person, idx) => {
                const card = document.createElement('div');
                card.className = 'person-card';
                card.innerHTML = `
                    <div>${person.name}</div>
                    <button class="delete-btn" onclick="deletePerson(${idx})">Sil</button>
                `;
                card.onclick = (e) => {
                    if (e.target.className !== 'delete-btn') {
                        selectPerson(idx);
                    }
                };
                grid.appendChild(card);
            });
        }

        function selectPerson(idx) {
            const data = getData();
            currentPerson = idx;
            showScreen('categoryScreen');
            renderCategories();
        }

        function deletePerson(idx) {
            if (confirm('Bu kişiyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons.splice(idx, 1);
                saveData(data);
                renderPersons();
            }
        }

        function openPersonModal() {
            document.getElementById('personName').value = '';
            document.getElementById('personModal').classList.add('active');
            document.getElementById('personName').focus();
        }

        function savePerson() {
            const name = document.getElementById('personName').value.trim();
            if (!name) {
                alert('Lütfen kişi adı girin!');
                return;
            }

            const data = getData();
            data.persons.push({ name, categories: [] });
            saveData(data);
            closeModal('personModal');
            renderPersons();
        }

        // Category Functions
        function renderCategories() {
            const data = getData();
            const person = data.persons[currentPerson];
            const grid = document.getElementById('categoryGrid');
            const empty = document.getElementById('emptyCategories');

            grid.innerHTML = '';

            if (!person || person.categories.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            person.categories.forEach((cat, idx) => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.background = cat.color;
                card.innerHTML = `
                    <div>${cat.name}</div>
                    <button class="delete-btn" onclick="deleteCategory(${idx})">Sil</button>
                `;
                card.onclick = (e) => {
                    if (e.target.className !== 'delete-btn') {
                        selectCategory(idx);
                    }
                };
                grid.appendChild(card);
            });
        }

        function selectCategory(idx) {
            currentCategory = idx;
            showScreen('wordScreen');
            renderWords();
        }

        function deleteCategory(idx) {
            if (confirm('Bu kategoriyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons[currentPerson].categories.splice(idx, 1);
                saveData(data);
                renderCategories();
            }
        }

        function openCategoryModal() {
            document.getElementById('categoryName').value = '';
            selectedColor = 'linear-gradient(135deg, #FFB6D9 0%, #FFD9E8 100%)';
            document.querySelectorAll('.color-option').forEach((el, idx) => {
                el.classList.toggle('selected', idx === 0);
            });
            document.getElementById('categoryModal').classList.add('active');
            document.getElementById('categoryName').focus();
        }

        function selectColor(el, color) {
            document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedColor = color;
        }

        function saveCategory() {
            const name = document.getElementById('categoryName').value.trim();
            if (!name) {
                alert('Lütfen kategori adı girin!');
                return;
            }

            const data = getData();
            data.persons[currentPerson].categories.push({
                name,
                color: selectedColor,
                words: []
            });
            saveData(data);
            closeModal('categoryModal');
            renderCategories();
        }

        // Word Functions
        function renderWords() {
            const data = getData();
            const category = data.persons[currentPerson].categories[currentCategory];
            const grid = document.getElementById('wordGrid');
            const empty = document.getElementById('emptyWords');

            grid.innerHTML = '';

            if (!category || category.words.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            category.words.forEach((word, idx) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerHTML = `
                    <div class="word-text">${word.text}</div>
                    ${word.image ? `<img src="${word.image}" class="word-image">` : ''}
                    <button class="speak-btn" onclick="speakWord('${word.text.replace(/'/g, "\\'")}')">🔊 Oku</button>
                    <button class="delete-btn" onclick="deleteWord(${idx})">Sil</button>
                `;
                grid.appendChild(card);
            });
        }

        function speakWord(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function deleteWord(idx) {
            if (confirm('Bu kelimeyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons[currentPerson].categories[currentCategory].words.splice(idx, 1);
                saveData(data);
                renderWords();
            }
        }

        function openWordModal() {
            document.getElementById('wordText').value = '';
            document.getElementById('wordImage').value = '';
            document.getElementById('wordModal').classList.add('active');
            document.getElementById('wordText').focus();
        }

        function saveWord() {
            const text = document.getElementById('wordText').value.trim();
            if (!text) {
                alert('Lütfen kelime/cümle girin!');
                return;
            }

            const fileInput = document.getElementById('wordImage');
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addWordToData(text, e.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                addWordToData(text, null);
            }
        }

        function addWordToData(text, image) {
            const data = getData();
            data.persons[currentPerson].categories[currentCategory].words.push({
                text,
                image
            });
            saveData(data);
            closeModal('wordModal');
            renderWords();
        }

        // Navigation
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goToPerson() {
            showScreen('personScreen');
            renderPersons();
        }

        function goToCategory() {
            showScreen('categoryScreen');
            renderCategories();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Close modal on outside click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
