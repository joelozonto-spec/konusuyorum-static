<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B6B">
    <meta name="description" content="Konuşuyorum - Konuşamayan çocuklar için sesli iletişim uygulaması">
    <title>Konuşuyorum 🎤</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(45deg, #FF6B6B, #FFE66D, #4ECDC4, #FF6B6B, #FFE66D, #4ECDC4);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin: 25px 0 35px 0;
            font-size: 3.5em;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2), 8px 8px 0px rgba(255,255,255,0.3);
            font-weight: 800;
            letter-spacing: 3px;
            animation: wiggle 2s ease-in-out infinite;
            transform: rotate(-2deg);
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-2deg) translateY(0); }
            25% { transform: rotate(2deg) translateY(-5px); }
            50% { transform: rotate(-2deg) translateY(0); }
            75% { transform: rotate(2deg) translateY(-5px); }
        }

        .screen {
            display: none;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .screen.active {
            display: block;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Person Selector Screen */
        .person-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 25px;
            margin: 25px 0;
        }

        .person-card {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%);
            border: 5px solid #FF4757;
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            color: white;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25), inset -3px -3px 0px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .person-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            transition: all 0.6s;
        }

        .person-card:hover {
            transform: translateY(-15px) scale(1.08) rotate(3deg);
            box-shadow: 0 15px 40px rgba(0,0,0,0.35), inset -3px -3px 0px rgba(0,0,0,0.1);
        }

        .person-card:active {
            transform: scale(0.92) rotate(-2deg);
        }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 18px;
            margin: 25px 0;
        }

        .category-card {
            border: 5px solid #333;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.3em;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset -3px -3px 0px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .category-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
        }

        .category-card:hover {
            transform: translateY(-12px) scale(1.1) rotate(5deg);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset -3px -3px 0px rgba(0,0,0,0.15);
        }

        .category-card:active {
            transform: scale(0.92);
        }

        /* Word Grid */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }

        .word-card {
            background: white;
            border: 5px solid #FF6B6B;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15), inset -3px -3px 0px rgba(255,107,107,0.1);
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4, #FF6B6B);
            background-size: 200% 100%;
            animation: slideGradient 3s ease infinite;
        }

        @keyframes slideGradient {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 0%; }
        }

        .word-card:hover {
            transform: translateY(-15px) scale(1.08) rotate(2deg);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25), inset -3px -3px 0px rgba(255,107,107,0.15);
        }

        .word-card:active {
            transform: scale(0.92);
        }

        .word-text {
            font-size: 1.5em;
            font-weight: 800;
            color: #FF6B6B;
            margin: 10px 0;
            word-break: break-word;
            line-height: 1.3;
            text-shadow: 1px 1px 0px rgba(255,107,107,0.2);
        }

        .word-image {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 15px;
            margin: 10px 0;
            border: 4px solid #FFE66D;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .speak-btn {
            background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%);
            color: #333;
            border: 4px solid #FF6B6B;
            border-radius: 20px;
            padding: 14px 20px;
            font-size: 1.2em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 100%;
            box-shadow: 0 6px 15px rgba(255,230,109,0.3);
            font-family: 'Fredoka', sans-serif;
        }

        .speak-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 20px rgba(255,230,109,0.4);
        }

        .speak-btn:active {
            transform: scale(0.95);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 18px 28px;
            font-size: 1.2em;
            font-weight: 800;
            border: 4px solid #333;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), inset -3px -3px 0px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #95E1D3 0%, #38ADA9 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF4757 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%);
            color: #333;
            border-color: #FF6B6B;
        }

        .btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3), inset -3px -3px 0px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.92);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            animation: fadeIn 0.3s ease-in;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF5E6 100%);
            padding: 40px;
            border-radius: 35px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset -3px -3px 0px rgba(0,0,0,0.05);
            border: 5px solid #FF6B6B;
            animation: slideUp 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            font-size: 2.2em;
            font-weight: 800;
            margin-bottom: 30px;
            color: #FF6B6B;
            text-shadow: 2px 2px 0px rgba(255,107,107,0.2);
        }

        .form-group {
            margin: 25px 0;
        }

        .form-group label {
            display: block;
            font-weight: 800;
            margin-bottom: 12px;
            font-size: 1.2em;
            color: #FF6B6B;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 16px;
            border: 4px solid #FF6B6B;
            border-radius: 20px;
            font-size: 1.1em;
            font-family: 'Fredoka', sans-serif;
            transition: all 0.3s;
            background: #FFFAF0;
            font-weight: 600;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #FFE66D;
            background: white;
            box-shadow: 0 0 0 4px rgba(255,230,109,0.3);
            transform: scale(1.02);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 110px;
        }

        .color-picker {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 5px solid #333;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .color-option.selected {
            border-color: #FF6B6B;
            transform: scale(1.25) rotate(8deg);
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-buttons button {
            flex: 1;
        }

        /* Back Button */
        .back-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%);
            color: white;
            border: 4px solid #FF4757;
            border-radius: 25px;
            padding: 16px 26px;
            font-size: 1.2em;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 8px 20px rgba(255,107,107,0.3);
            font-family: 'Fredoka', sans-serif;
        }

        .back-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 12px 30px rgba(255,107,107,0.4);
        }

        .back-btn:active {
            transform: scale(0.92);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 1.4em;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .empty-state-icon {
            font-size: 6em;
            margin-bottom: 25px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header {
                font-size: 2.5em;
                margin: 15px 0 20px 0;
            }

            .person-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .category-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .word-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .btn {
                min-width: 100px;
                padding: 14px 18px;
                font-size: 1em;
            }

            .modal-content {
                padding: 25px;
                border-radius: 25px;
            }

            .modal-header {
                font-size: 1.8em;
            }
        }

        .delete-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF4757 100%);
            color: white;
            border: 3px solid #FF4757;
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(255,107,107,0.2);
            font-family: 'Fredoka', sans-serif;
        }

        .delete-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255,107,107,0.3);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: linear-gradient(135deg, #FFE66D, #4ECDC4);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #FF6B6B, #FF8E72);
            border-radius: 10px;
            border: 2px solid white;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #FF4757, #FF6B6B);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🎤 Konuşuyorum</div>

        <!-- Person Selector Screen -->
        <div id="personScreen" class="screen active">
            <div class="button-group">
                <button class="btn btn-success" onclick="openPersonModal()">➕ Yeni Kişi Ekle</button>
            </div>
            <div id="personGrid" class="person-grid"></div>
            <div id="emptyPersons" class="empty-state" style="display: none;">
                <div class="empty-state-icon">👤</div>
                <div>Henüz kişi eklenmemiş! 🎉<br>Yeni kişi eklemek için butona basın!</div>
            </div>
        </div>

        <!-- Category Screen -->
        <div id="categoryScreen" class="screen">
            <button class="back-btn" onclick="goToPerson()">⬅️ Geri Dön</button>
            <div class="button-group">
                <button class="btn btn-success" onclick="openCategoryModal()">➕ Kategori Ekle</button>
            </div>
            <div id="categoryGrid" class="category-grid"></div>
            <div id="emptyCategories" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📂</div>
                <div>Henüz kategori eklenmemiş! 🎨<br>Yeni kategori eklemek için butona basın!</div>
            </div>
        </div>

        <!-- Word Screen -->
        <div id="wordScreen" class="screen">
            <button class="back-btn" onclick="goToCategory()">⬅️ Geri Dön</button>
            <div class="button-group">
                <button class="btn btn-success" onclick="openWordModal()">➕ Kelime/Cümle Ekle</button>
            </div>
            <div id="wordGrid" class="word-grid"></div>
            <div id="emptyWords" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📝</div>
                <div>Henüz kelime eklenmemiş! ✨<br>Yeni kelime eklemek için butona basın!</div>
            </div>
        </div>
    </div>

    <!-- Person Modal -->
    <div id="personModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Yeni Kişi Ekle</div>
            <div class="form-group">
                <label>Kişi Adı:</label>
                <input type="text" id="personName" placeholder="Örn: Ahmet">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="savePerson()">✅ Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('personModal')">❌ İptal</button>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Kategori Ekle</div>
            <div class="form-group">
                <label>Kategori Adı:</label>
                <input type="text" id="categoryName" placeholder="Örn: Meyve">
            </div>
            <div class="form-group">
                <label>Renk Seç:</label>
                <div class="color-picker">
                    <div class="color-option selected" style="background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #95E1D3 0%, #38ADA9 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #95E1D3 0%, #38ADA9 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #F38181 0%, #AA96DA 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #F38181 0%, #AA96DA 100%)')"></div>
                    <div class="color-option" style="background: linear-gradient(135deg, #A8EDEA 0%, #FED6E3 100%);" onclick="selectColor(this, 'linear-gradient(135deg, #A8EDEA 0%, #FED6E3 100%)')"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveCategory()">✅ Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('categoryModal')">❌ İptal</button>
            </div>
        </div>
    </div>

    <!-- Word Modal -->
    <div id="wordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">➕ Kelime/Cümle Ekle</div>
            <div class="form-group">
                <label>Kelime/Cümle:</label>
                <textarea id="wordText" placeholder="Örn: Merhaba"></textarea>
            </div>
            <div class="form-group">
                <label>Fotoğraf (isteğe bağlı):</label>
                <input type="file" id="wordImage" accept="image/*">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveWord()">✅ Kaydet</button>
                <button class="btn btn-danger" onclick="closeModal('wordModal')">❌ İptal</button>
            </div>
        </div>
    </div>

    <script>
        let currentPerson = null;
        let currentCategory = null;
        let selectedColor = 'linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%)';

        // Initialize
        function init() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
            renderPersons();
        }

        // Data Management
        function getData() {
            return JSON.parse(localStorage.getItem('konusuyorum') || '{"persons":[]}');
        }

        function saveData(data) {
            localStorage.setItem('konusuyorum', JSON.stringify(data));
        }

        // Person Functions
        function renderPersons() {
            const data = getData();
            const grid = document.getElementById('personGrid');
            const empty = document.getElementById('emptyPersons');

            grid.innerHTML = '';

            if (data.persons.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            data.persons.forEach((person, idx) => {
                const card = document.createElement('div');
                card.className = 'person-card';
                card.innerHTML = `
                    <div>${person.name}</div>
                    <button class="delete-btn" onclick="deletePerson(${idx})">🗑️ Sil</button>
                `;
                card.onclick = (e) => {
                    if (e.target.className !== 'delete-btn') {
                        selectPerson(idx);
                    }
                };
                grid.appendChild(card);
            });
        }

        function selectPerson(idx) {
            const data = getData();
            currentPerson = idx;
            showScreen('categoryScreen');
            renderCategories();
        }

        function deletePerson(idx) {
            if (confirm('Bu kişiyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons.splice(idx, 1);
                saveData(data);
                renderPersons();
            }
        }

        function openPersonModal() {
            document.getElementById('personName').value = '';
            document.getElementById('personModal').classList.add('active');
            document.getElementById('personName').focus();
        }

        function savePerson() {
            const name = document.getElementById('personName').value.trim();
            if (!name) {
                alert('Lütfen kişi adı girin!');
                return;
            }

            const data = getData();
            data.persons.push({ name, categories: [] });
            saveData(data);
            closeModal('personModal');
            renderPersons();
        }

        // Category Functions
        function renderCategories() {
            const data = getData();
            const person = data.persons[currentPerson];
            const grid = document.getElementById('categoryGrid');
            const empty = document.getElementById('emptyCategories');

            grid.innerHTML = '';

            if (!person || person.categories.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            person.categories.forEach((cat, idx) => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.background = cat.color;
                card.innerHTML = `
                    <div>${cat.name}</div>
                    <button class="delete-btn" onclick="deleteCategory(${idx})">🗑️ Sil</button>
                `;
                card.onclick = (e) => {
                    if (e.target.className !== 'delete-btn') {
                        selectCategory(idx);
                    }
                };
                grid.appendChild(card);
            });
        }

        function selectCategory(idx) {
            currentCategory = idx;
            showScreen('wordScreen');
            renderWords();
        }

        function deleteCategory(idx) {
            if (confirm('Bu kategoriyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons[currentPerson].categories.splice(idx, 1);
                saveData(data);
                renderCategories();
            }
        }

        function openCategoryModal() {
            document.getElementById('categoryName').value = '';
            selectedColor = 'linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%)';
            document.querySelectorAll('.color-option').forEach((el, idx) => {
                el.classList.toggle('selected', idx === 0);
            });
            document.getElementById('categoryModal').classList.add('active');
            document.getElementById('categoryName').focus();
        }

        function selectColor(el, color) {
            document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedColor = color;
        }

        function saveCategory() {
            const name = document.getElementById('categoryName').value.trim();
            if (!name) {
                alert('Lütfen kategori adı girin!');
                return;
            }

            const data = getData();
            data.persons[currentPerson].categories.push({
                name,
                color: selectedColor,
                words: []
            });
            saveData(data);
            closeModal('categoryModal');
            renderCategories();
        }

        // Word Functions
        function renderWords() {
            const data = getData();
            const category = data.persons[currentPerson].categories[currentCategory];
            const grid = document.getElementById('wordGrid');
            const empty = document.getElementById('emptyWords');

            grid.innerHTML = '';

            if (!category || category.words.length === 0) {
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            category.words.forEach((word, idx) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerHTML = `
                    <div class="word-text">${word.text}</div>
                    ${word.image ? `<img src="${word.image}" class="word-image">` : ''}
                    <button class="speak-btn" onclick="speakWord('${word.text.replace(/'/g, "\\'")}')">🔊 Oku</button>
                    <button class="delete-btn" onclick="deleteWord(${idx})">🗑️ Sil</button>
                `;
                grid.appendChild(card);
            });
        }

        function speakWord(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function deleteWord(idx) {
            if (confirm('Bu kelimeyi silmek istediğinizden emin misiniz?')) {
                const data = getData();
                data.persons[currentPerson].categories[currentCategory].words.splice(idx, 1);
                saveData(data);
                renderWords();
            }
        }

        function openWordModal() {
            document.getElementById('wordText').value = '';
            document.getElementById('wordImage').value = '';
            document.getElementById('wordModal').classList.add('active');
            document.getElementById('wordText').focus();
        }

        function saveWord() {
            const text = document.getElementById('wordText').value.trim();
            if (!text) {
                alert('Lütfen kelime/cümle girin!');
                return;
            }

            const fileInput = document.getElementById('wordImage');
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addWordToData(text, e.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                addWordToData(text, null);
            }
        }

        function addWordToData(text, image) {
            const data = getData();
            data.persons[currentPerson].categories[currentCategory].words.push({
                text,
                image
            });
            saveData(data);
            closeModal('wordModal');
            renderWords();
        }

        // Navigation
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goToPerson() {
            showScreen('personScreen');
            renderPersons();
        }

        function goToCategory() {
            showScreen('categoryScreen');
            renderCategories();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Close modal on outside click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
